version: '3.8'

services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: matrix-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_GO_API_URL=${NEXT_PUBLIC_GO_API_URL}
      - NEXT_PUBLIC_NODE_API_URL=${NEXT_PUBLIC_NODE_API_URL}
    stdin_open: true
    tty: true
